name: Auto Tag on Main Merge

on:
  push:
    branches:
      - main

jobs:
  create-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }} 

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate New Tag Version
        id: tag
        run: |
          # Obtiene el último tag creado. Si no existe, asume v0.0.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Último tag encontrado: $LATEST_TAG"
          
          # Extraer mayor, menor y parche
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          
          # Obtener los mensajes de los commits desde el último tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --format=%B)
          else
            COMMITS=$(git log ${LATEST_TAG}..HEAD --format=%B)
          fi
          
          # Lógica para determinar el incremento basado en Conventional Commits
          BUMP="patch"
          # Busca 'BREAKING CHANGE:' o commits que terminen en '!:' (ej. feat!:, fix(scope)!:)
          if echo "$COMMITS" | grep -qE 'BREAKING CHANGE:|^[a-zA-Z]+(\([^)]+\))?!:'; then
            BUMP="major"
          # Busca commits que empiecen con 'feat:' o 'feat(scope):'
          elif echo "$COMMITS" | grep -qE '^feat:|^feat\([^)]+\):'; then
            BUMP="minor"
          fi
          
          echo "Tipo de incremento detectado: $BUMP"
          
          # Incrementar las variables según corresponda
          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          
          echo "Nuevo tag a crear: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create and Push Tag
        run: |
          git tag ${{ steps.tag.outputs.new_tag }}
          # El push requerirá un PAT para disparar el workflow de despliegue
          git push origin ${{ steps.tag.outputs.new_tag }}
