name: Backmerge Stage to Develop

on:
  push:
    branches:
      - stage
  workflow_run:
    workflows: ["Backmerge Main to Stage"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  backmerge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout stage
        uses: actions/checkout@v4
        with:
          ref: stage
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch branches
        run: |
          git fetch origin stage
          git fetch origin develop

      - name: Create unique branch name
        id: branch
        run: |
          BRANCH="backmerge/stage-develop-${{ github.run_number }}-${{ github.run_attempt }}"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Push temporary branch
        run: |
          git checkout -B "${{ steps.branch.outputs.name }}" origin/stage
          git push origin "${{ steps.branch.outputs.name }}"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base develop \
            --head "${{ steps.branch.outputs.name }}" \
            --title "Backmerge stage → develop" \
            --body "Automated backmerge from **stage** into **develop**."

      - name: Get PR Number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --head "${{ steps.branch.outputs.name }}" \
            --base develop \
            --json number \
            --jq '.[0].number')

          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Wait until GitHub calculates mergeability
        id: mergeable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in {1..15}; do

            STATUS=$(gh pr view ${{ steps.pr.outputs.number }} \
              --json mergeable \
              --jq '.mergeable')

            echo "Mergeable status: $STATUS"

            if [ "$STATUS" != "UNKNOWN" ]; then
              echo "status=$STATUS" >> $GITHUB_OUTPUT
              exit 0
            fi

            sleep 2
          done

          echo "status=UNKNOWN" >> $GITHUB_OUTPUT

      - name: Enable Auto Merge
        if: steps.mergeable.outputs.status == 'MERGEABLE'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge \
            ${{ steps.pr.outputs.number }} \
            --merge \
            --auto \
            --delete-branch

      - name: Notify conflicts
        if: steps.mergeable.outputs.status == 'CONFLICTING'
        run: |
          echo "========================================"
          echo "Backmerge conflicts detected."
          echo "PR #${{ steps.pr.outputs.number }} requires manual resolution."
          echo "========================================"